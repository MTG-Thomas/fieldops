name: Bug Report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster it can be fixed.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Tap …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / browser
      placeholder: iPhone 13 Pro / Safari, Windows / Edge 124, etc.

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics (optional)
      description: |
        If the bug is related to HaloPSA API calls, paste `S.actionTypeDiscoveryAttempts`
        from the browser console, or any relevant errors from the Network tab.
      render: text
