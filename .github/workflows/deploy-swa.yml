name: Deploy SWA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Azure Static Web App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm --prefix api ci

      - name: Build frontend
        run: npm run build

      - name: Deploy frontend and managed API
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: >
          npx @azure/static-web-apps-cli deploy ./dist
          --api-location ./api
          --api-language node
          --api-version 20
          --env production
