name: Deploy Azure Infra

on:
  workflow_dispatch:
    inputs:
      use_mock_data:
        description: "Set FIELDOPS_USE_MOCK_DATA for the deployed app."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy:
    name: Deploy low-cost Azure infrastructure
    runs-on: ubuntu-latest
    env:
      AZURE_SUBSCRIPTION_ID: a1d63b24-1202-4bfa-9086-cf32d1d352fc
      AZURE_TENANT_ID: a3599b15-c39c-4b41-a219-7e24dd5b5190
      RESOURCE_GROUP: rg-fieldops-eastus2
      LOCATION: eastus2
      DEPLOYMENT_NAME: fieldops-infra

    steps:
      # Pinned to actions/checkout v4 for GitHub Actions supply-chain hygiene.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Azure login
        # Pinned to azure/login v2.3.0 for GitHub Actions supply-chain hygiene.
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: az group create --name "$RESOURCE_GROUP" --location "$LOCATION"

      - name: Deploy Bicep
        run: >
          az deployment group create
          --name "$DEPLOYMENT_NAME"
          --resource-group "$RESOURCE_GROUP"
          --template-file infra/main.bicep
          --parameters appName=fieldops staticSiteSku=Free

      - name: Read deployment outputs
        id: deploy_outputs
        run: |
          STORAGE_ACCOUNT_NAME=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs.storageAccountName.value -o tsv)
          APPINSIGHTS_CONNECTION_STRING=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs.appInsightsConnectionString.value -o tsv)
          if [ -z "$STORAGE_ACCOUNT_NAME" ]; then
            echo "Missing storage account deployment output" >&2
            exit 1
          fi
          if [ -z "$APPINSIGHTS_CONNECTION_STRING" ]; then
            echo "Missing Application Insights deployment output" >&2
            exit 1
          fi
          echo "storage_account_name=$STORAGE_ACCOUNT_NAME" >> "$GITHUB_OUTPUT"
          echo "appinsights_connection_string=$APPINSIGHTS_CONNECTION_STRING" >> "$GITHUB_OUTPUT"

      - name: Configure SWA app settings
        env:
          STORAGE_ACCOUNT_NAME: ${{ steps.deploy_outputs.outputs.storage_account_name }}
          FIELDOPS_ENCRYPTION_KEY: ${{ secrets.FIELDOPS_ENCRYPTION_KEY }}
          ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
          HALO_CLIENT_SECRET: ${{ secrets.HALO_CLIENT_SECRET }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ steps.deploy_outputs.outputs.appinsights_connection_string }}
          FIELDOPS_USE_MOCK_DATA: ${{ inputs.use_mock_data }}
        run: |
          fieldops_storage_connection_string="$(az storage account show-connection-string \
            --name "$STORAGE_ACCOUNT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query connectionString -o tsv)"
          echo "::add-mask::$fieldops_storage_connection_string"

          az staticwebapp appsettings set \
            --name fieldops \
            --resource-group "$RESOURCE_GROUP" \
            --setting-names \
            FIELDOPS_STORAGE_CONNECTION_STRING="$fieldops_storage_connection_string" \
            FIELDOPS_ENCRYPTION_KEY="$FIELDOPS_ENCRYPTION_KEY" \
            FIELDOPS_USE_MOCK_DATA="$FIELDOPS_USE_MOCK_DATA" \
            ENTRA_CLIENT_ID="$ENTRA_CLIENT_ID" \
            ENTRA_CLIENT_SECRET="$ENTRA_CLIENT_SECRET" \
            HALO_CLIENT_SECRET="$HALO_CLIENT_SECRET" \
            APPLICATIONINSIGHTS_CONNECTION_STRING="$APPLICATIONINSIGHTS_CONNECTION_STRING"
