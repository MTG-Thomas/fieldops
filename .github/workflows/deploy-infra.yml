name: Deploy Azure Infra

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy low-cost Azure infrastructure
    runs-on: ubuntu-latest
    env:
      AZURE_SUBSCRIPTION_ID: a1d63b24-1202-4bfa-9086-cf32d1d352fc
      AZURE_TENANT_ID: a3599b15-c39c-4b41-a219-7e24dd5b5190
      RESOURCE_GROUP: rg-fieldops-eastus2
      LOCATION: eastus2
      DEPLOYMENT_NAME: fieldops-infra

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: az group create --name "$RESOURCE_GROUP" --location "$LOCATION"

      - name: Deploy Bicep
        run: >
          az deployment group create
          --name "$DEPLOYMENT_NAME"
          --resource-group "$RESOURCE_GROUP"
          --template-file infra/main.bicep
          --parameters appName=fieldops staticSiteSku=Free

      - name: Read deployment outputs
        id: deploy_outputs
        run: |
          STORAGE_CONNECTION_STRING=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs.storageConnectionString.value -o tsv)
          APPINSIGHTS_CONNECTION_STRING=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs.appInsightsConnectionString.value -o tsv)
          echo "storage_connection_string=$STORAGE_CONNECTION_STRING" >> "$GITHUB_OUTPUT"
          echo "appinsights_connection_string=$APPINSIGHTS_CONNECTION_STRING" >> "$GITHUB_OUTPUT"

      - name: Configure SWA app settings
        run: >
          az staticwebapp appsettings set
          --name fieldops
          --resource-group "$RESOURCE_GROUP"
          --setting-names
          FIELDOPS_STORAGE_CONNECTION_STRING="${{ steps.deploy_outputs.outputs.storage_connection_string }}"
          FIELDOPS_ENCRYPTION_KEY="${{ secrets.FIELDOPS_ENCRYPTION_KEY }}"
          FIELDOPS_USE_MOCK_DATA=true
          ENTRA_CLIENT_ID="${{ secrets.ENTRA_CLIENT_ID }}"
          ENTRA_CLIENT_SECRET="${{ secrets.ENTRA_CLIENT_SECRET }}"
          HALO_CLIENT_SECRET="${{ secrets.HALO_CLIENT_SECRET }}"
          APPLICATIONINSIGHTS_CONNECTION_STRING="${{ steps.deploy_outputs.outputs.appinsights_connection_string }}"
